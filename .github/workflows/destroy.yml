name: Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm tearing down all infrastructure'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/terraform/gcp
    env:
      TF_WORKSPACE: gcp

    steps:
      - name: Verify confirmation
        if: ${{ inputs.confirm != 'destroy' }}
        run: |
          echo "Confirmation mismatch — expected 'destroy', got '${{ inputs.confirm }}'"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev --quiet

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ vars.GCP_REGION || 'us-central1' }}
          TF_VAR_bucket_name: ${{ secrets.GCS_BUCKET_NAME }}
          TF_VAR_openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          TF_VAR_cors_origins: ${{ vars.CORS_ORIGINS || 'http://localhost:3000' }}
        run: terraform destroy -input=false -auto-approve
